serialization:
  name: raw
  method: raw
  description: 아무런 판단 및 가공 처리 없이 파이썬 dict 형식 그대로 문자열화하여 임베딩합니다 (가장 기본적인 베이스라인).
  exclude_fields: []
retrieval:
  method: top_k
  top_k: 5
  metric: IP
  normalize_query: true
prompt:
  method: raw_stuffing
  description: '원문 그대로 stuffing: retrieved chunks를 순서대로 그대로 붙여 전달 (baseline)'
  exclude_fields:
  - answer
  - Human Accuracy
query_representation:
  method: question_only
  description: 질문 텍스트만 query 임베딩에 사용합니다 (baseline).
experiment_name: serialization__raw
output_dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
