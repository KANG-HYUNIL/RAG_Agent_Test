serialization:
  name: kv_pairs
  method: kv_pairs
  description: 가장 단순한 키-값 구조로 직렬화합니다.
  exclude_fields:
  - answer
  - Human Accuracy
retrieval:
  method: top_k
  top_k: 5
  metric: IP
  normalize_query: true
prompt:
  method: few_shot_envelope
  num_examples: 3
  description: 'few_shot_envelope: retrieved 예시를 Q&A 데모로 포맷팅하여 출력 양식 고정'
query_representation:
  method: question_only
  description: 질문 텍스트만 query 임베딩에 사용합니다 (baseline).
experiment_name: prompt__few_shot_envelope
output_dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
