serialization:
  name: weighted
  method: field_weighted_kv
  description: 질문(Question)과 영역(Category)에 가중치를 두어 먼저 배치하는 직렬화입니다.
  exclude_fields:
  - answer
  - Human Accuracy
retrieval:
  method: top_k
  top_k: 5
  metric: IP
  normalize_query: true
prompt:
  method: raw_stuffing
  description: '원문 그대로 stuffing: retrieved chunks를 순서대로 그대로 붙여 전달 (baseline)'
  exclude_fields:
  - answer
  - Human Accuracy
query_representation:
  method: question_only
  description: 질문 텍스트만 query 임베딩에 사용합니다 (baseline).
experiment_name: serialization__weighted
output_dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
