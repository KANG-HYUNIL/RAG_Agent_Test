serialization:
  name: kv_pairs_no_category
  method: kv_pairs
  description: kv_pairs에서 Category도 추가 제외. Category(Law/Criminal Law)의 임베딩 기여 ablation
    실험용.
  exclude_fields:
  - answer
  - Human Accuracy
  - Category
retrieval:
  method: top_k
  top_k: 5
  metric: IP
  normalize_query: true
prompt:
  method: raw_stuffing
  description: '원문 그대로 stuffing: retrieved chunks를 순서대로 그대로 붙여 전달 (baseline)'
  exclude_fields:
  - answer
  - Human Accuracy
query_representation:
  method: question_only
  description: 질문 텍스트만 query 임베딩에 사용합니다 (baseline).
experiment_name: serialization__kv_pairs_no_category
output_dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
