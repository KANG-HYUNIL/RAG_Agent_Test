# rerank_polarity_bm25aux.yaml
# stage6__dense_rerank_polarity_bm25aux 용
# polarity penalty + BM25 auxiliary 동시 적용 — 조합 효과 확인

method: rerank
top_k: 5
metric: "IP"
normalize_query: true
score_threshold:
  value: 0.35
rerank:
  retrieve_k: 10
  final_k: 5
  polarity_penalty: 0.08
  bm25_aux_weight: 0.3
  template_penalty: 0.0
  template_overlap_threshold: 0.3
